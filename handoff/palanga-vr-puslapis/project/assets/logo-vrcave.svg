<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <!-- Circle background -->
  <circle cx="40" cy="40" r="36" fill="#0B0B3A"/>

  <!-- Top headband strap -->
  <rect x="29" y="12" width="22" height="8" rx="4" fill="#2EBEF0"/>
  <rect x="36" y="19" width="8" height="4" fill="#2EBEF0"/>

  <!-- Main visor body -->
  <rect x="10" y="23" width="60" height="32" rx="10" fill="#2EBEF0"/>

  <!-- Side arms / straps -->
  <path d="M10 30 C6 30 4 33 4 37 C4 41 6 44 10 44" stroke="#2EBEF0" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M70 30 C74 30 76 33 76 37 C76 41 74 44 70 44" stroke="#2EBEF0" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Left lens -->
  <rect x="12" y="25" width="22" height="26" rx="7" fill="#0d2a42"/>
  <!-- Left lens shine -->
  <rect x="15" y="27" width="6" height="4" rx="2" fill="#2EBEF0" opacity="0.4"/>

  <!-- Right lens -->
  <rect x="46" y="25" width="22" height="26" rx="7" fill="#0d2a42"/>
  <!-- Right lens shine -->
  <rect x="49" y="27" width="6" height="4" rx="2" fill="#2EBEF0" opacity="0.4"/>

  <!-- Nose bridge -->
  <rect x="35" y="31" width="10" height="14" rx="3" fill="#0B0B3A"/>

  <!-- Text -->
  <text x="92" y="52" font-family="Sora, 'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="34" letter-spacing="-0.5" fill="#0B0B3A">PALANGA<tspan fill="#F2466E">VR</tspan></text>
</svg>
