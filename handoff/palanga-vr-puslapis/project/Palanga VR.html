<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <title>Palanga VR — VR pabėgimo kambariai Palangoje</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230B0B3A'/%3E%3Ctext x='32' y='42' font-family='Sora' font-weight='800' font-size='34' fill='url(%23g)' text-anchor='middle'%3EVR%3C/text%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1'%3E%3Cstop offset='0' stop-color='%23F8A24B'/%3E%3Cstop offset='1' stop-color='%23F2466E'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E">
  <style>
    html, body { margin: 0; background: var(--bg-stage); }
    .btn--outline { background: #fff; }
    /* anchor offset for sticky header */
    section[id] { scroll-margin-top: 90px; }
    /* hide header phone on narrow viewports to keep nav single-row */
    @media (max-width: 1180px) {
      .header-phone { display: none !important; }
    }
    /* difficulty dots — CSS classes (resistant to inline-style direct-edit overrides) */
    .diff-dot { border-radius: 50%; display: inline-block; }
    .diff-dot--hard { background: var(--heat-orange); }
    .diff-dot--easy { background: var(--beacon-cyan); }
    .diff-dot--empty { background: var(--difficulty-empty); }
    /* tweak: accent color swap */
    body[data-accent="cyan"] {
      --heat-orange: #2EBEF0;
      --heat-pink: #1689C4;
      --heat-gradient: linear-gradient(90deg, #2EBEF0 0%, #1689C4 100%);
    }
    body[data-accent="violet"] {
      --heat-orange: #B57BFF;
      --heat-pink: #6B2FE6;
      --heat-gradient: linear-gradient(90deg, #B57BFF 0%, #6B2FE6 100%);
    }
    body[data-accent="lime"] {
      --heat-orange: #C7F050;
      --heat-pink: #5BC02C;
      --heat-gradient: linear-gradient(90deg, #C7F050 0%, #5BC02C 100%);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="src/data.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="src/components.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="src/Hero.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="src/GamesGrid.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="src/GameDetail.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="src/Sections.jsx" data-presets="env,react"></script>
  <script type="text/babel" src="src/BookingModal.jsx" data-presets="env,react"></script>

  <script type="text/babel" data-presets="env,react">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "orange",
      "heroLayout": "centered",
      "pricingStyle": "rows"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = React.useState({ name: 'home' });
      const [booking, setBooking] = React.useState({ open: false, gameSlug: null, players: 4 });
      const [activeSection, setActiveSection] = React.useState('home');

      // Sync accent on body
      React.useEffect(() => { document.body.setAttribute('data-accent', t.accent); }, [t.accent]);

      const openGame = (game) => {
        setRoute({ name: 'detail', game });
        window.scrollTo({ top: 0, behavior: 'instant' });
      };
      const goHome = () => {
        setRoute({ name: 'home' });
        window.scrollTo({ top: 0, behavior: 'instant' });
      };
      const goGames = () => {
        if (route.name !== 'home') {
          setRoute({ name: 'home' });
          setTimeout(() => document.getElementById('games')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        } else {
          document.getElementById('games')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      };
      const navTo = (id) => {
        if (route.name !== 'home') {
          setRoute({ name: 'home' });
          setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
        } else {
          document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      };
      const openBooking = (opts = {}) => {
        const players = typeof opts === 'number' ? opts : (opts.players || 4);
        const gameSlug = typeof opts === 'object' ? opts.gameSlug : null;
        setBooking({ open: true, gameSlug, players });
      };
      const closeBooking = () => setBooking(b => ({ ...b, open: false }));

      // Scroll spy for nav highlight
      React.useEffect(() => {
        if (route.name !== 'home') return;
        const ids = ['games', 'how', 'pricing', 'faq', 'contact'];
        const onScroll = () => {
          const y = window.scrollY + 140;
          let current = '';
          for (const id of ids) {
            const el = document.getElementById(id);
            if (el && el.offsetTop <= y) current = id;
          }
          setActiveSection(current);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, [route]);

      const screenLabel = route.name === 'home' ? '01 Home' : `02 Game · ${route.game.title}`;

      return (
        <div data-screen-label={screenLabel}>
          <Header
            current={activeSection}
            onNav={navTo}
            onBook={() => openBooking()}
            onHome={goHome}
          />
          {route.name === 'home' && (
            <>
              <Hero
                layout={t.heroLayout}
                onBook={() => openBooking()}
                onScrollGames={goGames}
              />
              <GamesGrid
                onOpenGame={openGame}
                title="Pabėgimo kambariai"
                subtitle="Kiekvienas pasaulis – azartiški nuotykiai, unikalios vietos, intriguojantys galvosūkiai."
                anchorId="games"
              />
              <HowItWorks />
              <Pricing
                style={t.pricingStyle}
                onBook={(players) => openBooking({ players })}
              />
              <FAQ />
              <Contact onBook={() => openBooking()} />
            </>
          )}
          {route.name === 'detail' && (
            <GameDetail
              game={route.game}
              onBack={goGames}
              onOpenGame={openGame}
              onBook={() => openBooking({ gameSlug: route.game.slug })}
            />
          )}
          <Footer onNav={navTo} onBook={() => openBooking()} />

          <BookingModal
            open={booking.open}
            onClose={closeBooking}
            initialGameSlug={booking.gameSlug}
            initialPlayers={booking.players}
          />

          <TweaksPanel title="Tweaks">
            <TweakSection label="Akcento spalva" />
            <TweakColor
              label="Akcentas"
              value={t.accent === 'orange' ? '#F2466E' : t.accent === 'cyan' ? '#2EBEF0' : t.accent === 'violet' ? '#6B2FE6' : '#5BC02C'}
              options={['#F2466E', '#2EBEF0', '#6B2FE6', '#5BC02C']}
              onChange={(v) => {
                const m = { '#F2466E': 'orange', '#2EBEF0': 'cyan', '#6B2FE6': 'violet', '#5BC02C': 'lime' };
                setTweak('accent', m[v] || 'orange');
              }}
            />
            <TweakSection label="Pagrindinis ekranas" />
            <TweakSelect
              label="Hero išdėstymas"
              value={t.heroLayout}
              options={[
                { value: 'centered', label: 'Centruotas' },
                { value: 'left', label: 'Kairėje + plakatai' },
                { value: 'full-poster', label: 'Visas plakatas' },
              ]}
              onChange={(v) => setTweak('heroLayout', v)}
            />
            <TweakSection label="Kainos" />
            <TweakRadio
              label="Stilius"
              value={t.pricingStyle}
              options={[
                { value: 'rows', label: 'Eilutės' },
                { value: 'cards', label: 'Kortelės' },
              ]}
              onChange={(v) => setTweak('pricingStyle', v)}
            />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
