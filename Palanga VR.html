                    }
                    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                      <div style={{ width:96, height:96, borderRadius:'50%', background:'rgba(255,255,255,0.95)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'0 12px 32px rgba(0,0,0,0.4)' }}>
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="var(--navy-900)" style={{ marginLeft:4 }}><polygon points="6 4 20 12 6 20 6 4"/></svg>
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
          {/* More games */}
          <section style={{ padding:'80px 32px 16px' }}>
            <div style={{ maxWidth:1320, margin:'0 auto' }}>
              <h3 style={{ font:'800 40px/1 var(--font-display)', color:'#fff', textTransform:'uppercase', margin:'0 0 32px', display:'inline-flex', alignItems:'center', gap:24 }}>
                {d.moreGames}
                <span style={{ display:'inline-block', width:120, height:2, background:'rgba(255,255,255,0.4)' }}/>
              </h3>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:24 }}>
                {others.map(g => <GameCard key={g.slug} game={g} onClick={()=>onOpenGame(g)}/>)}
              </div>
            </div>
          </section>
          {/* CTA strip */}
          <section style={{ padding:'80px 32px 96px' }}>
            <div style={{ maxWidth:1320, margin:'0 auto', background:'var(--heat-gradient)', borderRadius:'var(--radius-card-lg)', padding:'56px 48px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:32, flexWrap:'wrap' }}>
              <div>
                <h3 style={{ font:'800 36px/1.05 var(--font-display)', color:'#fff', textTransform:'uppercase', margin:'0 0 12px' }}>{d.ctaTitle}</h3>
                <p style={{ font:'500 17px/1.5 var(--font-body)', color:'rgba(255,255,255,0.95)', margin:0, maxWidth:540 }}>{d.ctaSub}</p>
              </div>
              <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
                <button onClick={onBack} style={{ padding:'16px 28px', borderRadius:999, background:'transparent', border:'2px solid rgba(255,255,255,0.6)', color:'#fff', font:'700 15px var(--font-display)', cursor:'pointer' }}>{d.ctaBack}</button>
                <button onClick={onBook} style={{ padding:'16px 32px', borderRadius:999, background:'#fff', border:'none', color:'var(--navy-900)', font:'700 15px var(--font-display)', cursor:'pointer' }}>{d.ctaBook}</button>
              </div>
            </div>
          </section>
        </div>
      );
    };

    /* ===================================================================
       BOOKING MODAL
       =================================================================== */
    const TIMES = ['12:00','13:30','15:00','16:30','18:00','19:30','21:00'];
    const useFormatDate = () => {
      const lang = useLang();
      return (d) => `${d.getDate()} ${TRANSLATIONS[lang].months[d.getMonth()]}`;
    };

    const Label = ({ children }) => (
      <div style={{ font:'700 12px var(--font-display)', color:'var(--fg-muted)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:14 }}>{children}</div>
    );
    const Field = ({ label, value, onChange, placeholder, type='text' }) => (
      <label style={{ display:'flex', flexDirection:'column', gap:8 }}>
        <span style={{ font:'700 12px var(--font-display)', color:'var(--fg-muted)', textTransform:'uppercase', letterSpacing:'0.08em' }}>{label}</span>
        <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{ padding:'14px 18px', borderRadius:999, border:'1.5px solid var(--gray-300)', background:'#fff', font:'400 15px var(--font-body)', color:'var(--fg)', outline:'none' }}/>
      </label>
    );

    const Step1 = ({ game, setGame, players, setPlayers }) => {
      const t = useT();
      const lang = useLang();
      const diff = TRANSLATIONS[lang].diff;
      return (
      <div style={{ display:'flex', flexDirection:'column', gap:32 }}>
        <div>
          <Label>{t('booking.roomLabel')}</Label>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12 }}>
            {GAMES.map(g =>
              <button key={g.slug} onClick={()=>setGame(g.slug)} style={{ padding:8, border: game===g.slug ? '2px solid var(--navy-900)' : '2px solid transparent', borderRadius:16, background: game===g.slug ? 'var(--off-white)' : '#fff', cursor:'pointer', textAlign:'left', display:'flex', flexDirection:'column', gap:8 }}>
                <div style={{ aspectRatio:'5/7', borderRadius:10, backgroundImage:`url(${g.poster})`, backgroundSize:'cover', backgroundPosition:'center' }}/>
                <span style={{ font:'700 13px var(--font-display)', color:'var(--fg)', padding:'0 4px' }}>{g.title}</span>
                <span style={{ font:'500 11px var(--font-body)', color:'var(--fg-muted)', padding:'0 4px' }}>{diff[g.difficultyName]||g.difficultyName}</span>
              </button>
            )}
          </div>
        </div>
        <div>
          <Label>{t('booking.playersLabel')}</Label>
          <div style={{ display:'flex', gap:8 }}>
            {[2,3,4,5,6].map(n =>
              <button key={n} onClick={()=>setPlayers(n)} style={{ flex:1, padding:'20px 0', border: players===n ? '2px solid var(--navy-900)' : '1.5px solid var(--gray-300)', borderRadius:16, background: players===n ? 'var(--navy-900)' : '#fff', color: players===n ? '#fff' : 'var(--fg)', cursor:'pointer', display:'flex', flexDirection:'column', gap:4, alignItems:'center' }}>
                <span style={{ font:'800 24px var(--font-display)' }}>{n}</span>
                <span style={{ font:'500 11px var(--font-body)', color: players===n ? 'rgba(255,255,255,0.7)' : 'var(--fg-muted)' }}>{PRICING.find(p=>p.players===n).price} €</span>
              </button>
            )}
          </div>
        </div>
      </div>
      );
    };

    const Step2 = ({ dates, dateIdx, setDateIdx, time, setTime }) => {
      const t = useT();
      const lang = useLang();
      const formatDate = useFormatDate();
      const dayNames = TRANSLATIONS[lang].days;
      const months = TRANSLATIONS[lang].months;
      return (
      <div style={{ display:'flex', flexDirection:'column', gap:32 }}>
        <div>
          <Label>{t('booking.dateLabel')}</Label>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:8 }}>
            {dates.map((d,i) => {
              const sel = dateIdx===i;
              return (
                <button key={i} onClick={()=>setDateIdx(i)} style={{ padding:'14px 8px', border: sel ? '2px solid var(--navy-900)' : '1.5px solid var(--gray-300)', borderRadius:12, background: sel ? 'var(--navy-900)' : '#fff', color: sel ? '#fff' : 'var(--fg)', cursor:'pointer', display:'flex', flexDirection:'column', gap:4, alignItems:'center' }}>
                  <span style={{ font:'500 11px var(--font-display)', textTransform:'uppercase', color: sel ? 'rgba(255,255,255,0.7)' : 'var(--fg-muted)', letterSpacing:'0.06em' }}>{i===0 ? t('booking.today') : dayNames[d.getDay()]}</span>
                  <span style={{ font:'800 20px var(--font-display)' }}>{d.getDate()}</span>
                  <span style={{ font:'400 10px var(--font-body)', color: sel ? 'rgba(255,255,255,0.6)' : 'var(--fg-subtle)' }}>{months[d.getMonth()]}</span>
                </button>
              );
            })}
          </div>
        </div>
        <div>
          <Label>{t('booking.timesLabel').replace('{date}', formatDate(dates[dateIdx]))}</Label>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:8 }}>
            {TIMES.map(tm => {
              const busy = (dateIdx + TIMES.indexOf(tm)) % 5 === 0;
              const sel = tm===time;
              return (
                <button key={tm} onClick={()=>!busy&&setTime(tm)} disabled={busy} style={{ padding:'14px 0', border: sel ? '2px solid var(--navy-900)' : '1.5px solid var(--gray-300)', borderRadius:999, background: busy ? 'var(--gray-200)' : sel ? 'var(--navy-900)' : '#fff', color: busy ? 'var(--gray-500)' : sel ? '#fff' : 'var(--fg)', cursor: busy ? 'not-allowed' : 'pointer', font:'700 14px var(--font-display)', textDecoration: busy ? 'line-through' : 'none' }}>{tm}</button>
              );
            })}
          </div>
          <p style={{ font:'400 13px var(--font-body)', color:'var(--fg-muted)', marginTop:12 }}>{t('booking.timesNote')}</p>
        </div>
      </div>
      );
    };

    const Step3 = ({ name, setName, phone, setPhone, email, setEmail }) => {
      const t = useT();
      const lang = useLang();
      return (
      <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
        <Field label={t('booking.nameLabel')} value={name} onChange={setName} placeholder={TRANSLATIONS[lang].booking.namePlaceholder}/>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
          <Field label={t('booking.phoneLabel')} value={phone} onChange={setPhone} placeholder="+370 ___ _____" type="tel"/>
          <Field label={t('booking.emailLabel')} value={email} onChange={setEmail} placeholder="vardas@email.lt" type="email"/>
        </div>
        <div style={{ background:'var(--off-white)', borderRadius:16, padding:20, display:'flex', gap:12, alignItems:'flex-start' }}>
          <span style={{ width:28, height:28, borderRadius:999, background:'var(--navy-900)', color:'#fff', flexShrink:0, display:'inline-flex', alignItems:'center', justifyContent:'center', font:'700 13px var(--font-display)' }}>i</span>
          <div style={{ font:'400 14px/1.55 var(--font-body)', color:'var(--fg-muted)' }}>{t('booking.infoNote')}</div>
        </div>
      </div>
      );
    };

    const BookingSuccess = ({ game, date, time, players, onClose }) => {
      const t = useT();
      const formatDate = useFormatDate();
      const b = TRANSLATIONS[useLang()].booking;
      return (
      <div style={{ padding:'64px 48px 48px', textAlign:'center' }}>
        <div style={{ width:72, height:72, borderRadius:'50%', background:'var(--heat-gradient)', margin:'0 auto 24px', display:'inline-flex', alignItems:'center', justifyContent:'center', color:'#fff' }}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h3 style={{ font:'800 32px var(--font-display)', color:'var(--fg)', textTransform:'uppercase', margin:'0 0 12px' }}>{b.successTitle}</h3>
        <p style={{ font:'500 16px/1.6 var(--font-body)', color:'var(--fg-muted)', margin:'0 auto 32px', maxWidth:440 }}>{b.successSub}</p>
        <div style={{ display:'inline-flex', flexDirection:'column', gap:12, padding:24, background:'var(--off-white)', borderRadius:16, textAlign:'left', minWidth:320 }}>
          {[[b.summaryRoom,game.title],[b.summaryDate,formatDate(date)],[b.summaryTime,time],[b.summaryTeam,b.teamVal.replace('{n}',players)]].map(([l,v]) =>
            <div key={l} style={{ display:'flex', justifyContent:'space-between', gap:32, font:'500 14px var(--font-body)' }}>
              <span style={{ color:'var(--fg-muted)' }}>{l}</span>
              <span style={{ color:'var(--fg)', fontWeight:700 }}>{v}</span>
            </div>
          )}
        </div>
        <div style={{ marginTop:32 }}>
          <button onClick={onClose} className="btn btn--primary" style={{ padding:'14px 32px' }}>{b.close}</button>
        </div>
      </div>
      );
    };

    const BookingModal = ({ open, onClose, initialGameSlug, initialPlayers=4 }) => {
      const [step, setStep] = React.useState(1);
      const [game, setGame] = React.useState(initialGameSlug || GAMES[0].slug);
      const [players, setPlayers] = React.useState(initialPlayers);
      const [dateIdx, setDateIdx] = React.useState(2);
      const [time, setTime] = React.useState('18:00');
      const [name, setName] = React.useState('');
      const [phone, setPhone] = React.useState('');
      const [email, setEmail] = React.useState('');
      const [done, setDone] = React.useState(false);

      React.useEffect(() => {
        if (open) { setStep(1); setDone(false); if (initialGameSlug) setGame(initialGameSlug); if (initialPlayers) setPlayers(initialPlayers); }
      }, [open, initialGameSlug, initialPlayers]);

      if (!open) return null;
      const today = new Date();
      const dates = Array.from({length:14}, (_,i) => { const d=new Date(today); d.setDate(today.getDate()+i); return d; });
      const selectedGame = GAMES.find(g=>g.slug===game);
      const priceRow = PRICING.find(p=>p.players===players) || PRICING[2];

      return (
        <div onClick={onClose} style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(11,11,58,0.7)', backdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', padding:24, overflow:'auto' }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:'#fff', color:'var(--fg)', borderRadius:'var(--radius-card-lg)', maxWidth:880, width:'100%', maxHeight:'92vh', overflow:'auto', position:'relative', boxShadow:'0 32px 80px rgba(0,0,0,0.5)' }}>
            <button onClick={onClose} style={{ position:'absolute', top:20, right:20, zIndex:10, width:40, height:40, borderRadius:999, background:'var(--gray-200)', border:'none', cursor:'pointer', display:'inline-flex', alignItems:'center', justifyContent:'center' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            {done ? (
              <BookingSuccess game={selectedGame} date={dates[dateIdx]} time={time} players={players} onClose={onClose}/>
            ) : (
              <>
                <div style={{ padding:'32px 40px 24px', borderBottom:'1px solid var(--gray-200)' }}>
                  {(() => { const b = TRANSLATIONS[useLang()].booking; return (<>
                  <span style={{ font:'700 12px var(--font-display)', color:'var(--heat-pink)', textTransform:'uppercase', letterSpacing:'0.12em' }}>{b.title.replace('{n}',step)}</span>
                  <h3 style={{ font:'800 32px var(--font-display)', color:'var(--fg)', textTransform:'uppercase', margin:'8px 0 0' }}>
                    {step===1 && b.step1Title}
                    {step===2 && b.step2Title}
                    {step===3 && b.step3Title}
                  </h3>
                  </>); })()}
                  <div style={{ display:'flex', gap:6, marginTop:16 }}>
                    {[1,2,3].map(s => <div key={s} style={{ height:4, flex:1, borderRadius:999, background: s<=step ? 'var(--heat-gradient)' : 'var(--gray-200)' }}/>)}
                  </div>
                </div>
                <div style={{ padding:40 }}>
                  {step===1 && <Step1 game={game} setGame={setGame} players={players} setPlayers={setPlayers}/>}
                  {step===2 && <Step2 dates={dates} dateIdx={dateIdx} setDateIdx={setDateIdx} time={time} setTime={setTime}/>}
                  {step===3 && <Step3 name={name} setName={setName} phone={phone} setPhone={setPhone} email={email} setEmail={setEmail}/>}
                </div>
                <div style={{ borderTop:'1px solid var(--gray-200)', padding:'20px 40px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, background:'var(--off-white)', borderBottomLeftRadius:'var(--radius-card-lg)', borderBottomRightRadius:'var(--radius-card-lg)' }}>
                  <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
                    {(() => { const b = TRANSLATIONS[useLang()].booking; return (<>
                  <span style={{ font:'500 12px var(--font-display)', color:'var(--fg-muted)', textTransform:'uppercase', letterSpacing:'0.06em' }}>{b.total}</span>
                    <span style={{ font:'800 28px var(--font-display)', color:'var(--fg)' }}>{priceRow.price} €</span>
                    <span style={{ font:'500 12px var(--font-body)', color:'var(--fg-muted)' }}>{b.perPersonPlayers.replace('{price}',priceRow.perPerson.toFixed(priceRow.perPerson%1?2:0)).replace('{n}',players)}</span>
                  </>); })()}
                  </div>
                  <div style={{ display:'flex', gap:12 }}>
                    {(() => { const b = TRANSLATIONS[useLang()].booking; return (<>
                    {step>1 && <button onClick={()=>setStep(step-1)} className="btn btn--outline" style={{ background:'#fff', padding:'14px 24px' }}>{b.back}</button>}
                    {step<3
                      ? <button onClick={()=>setStep(step+1)} className="btn btn--primary" style={{ padding:'14px 28px' }}>{b.next}</button>
                      : <button onClick={()=>setDone(true)} className="btn btn--primary" style={{ padding:'14px 28px' }}>{b.confirm}</button>
                    }
                    </>); })()}
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    };

    /* ===================================================================
       APP ROOT
       =================================================================== */
    /* ── Video popup helper ── */
    const openVideoPopup = (youtubeId) => {
      const w = Math.min(window.screen.availWidth - 40, 1000);
      const h = Math.round(w * 9/16) + 30;
      const left = Math.round((window.screen.availWidth - w) / 2);
      const top  = Math.round((window.screen.availHeight - h) / 2);
      window.open(
        `https://www.youtube.com/watch?v=${youtubeId}`,
        'yt_popup',
        `width=${w},height=${h},left=${left},top=${top},resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no`
      );
    };

    function App() {
      const [lang, setLang] = React.useState('lt');
      const [route, setRoute] = React.useState({ name:'home' });
      const [booking, setBooking] = React.useState({ open:false, gameSlug:null, players:4 });
      const [activeSection, setActiveSection] = React.useState('');

      const openGame = (game) => { setRoute({ name:'detail', game }); window.scrollTo({ top:0, behavior:'instant' }); };
      const goHome   = ()     => { setRoute({ name:'home' });           window.scrollTo({ top:0, behavior:'instant' }); };
      const navTo = (id) => {
        if (route.name!=='home') { setRoute({ name:'home' }); setTimeout(()=>document.getElementById(id)?.scrollIntoView({ behavior:'smooth', block:'start' }), 50); }
        else document.getElementById(id)?.scrollIntoView({ behavior:'smooth', block:'start' });
      };
      const goGames = () => navTo('games');
      const openBooking = (opts={}) => {
        const players = typeof opts==='number' ? opts : (opts.players||4);
        const gameSlug = typeof opts==='object' ? opts.gameSlug : null;
        setBooking({ open:true, gameSlug, players });
      };
      const closeBooking = () => setBooking(b=>({...b,open:false}));

      React.useEffect(() => {
        if (route.name!=='home') return;
        const ids = ['games','how','pricing','faq','contact'];
        const onScroll = () => {
          const y = window.scrollY+140; let current='';
          for (const id of ids) { const el=document.getElementById(id); if (el&&el.offsetTop<=y) current=id; }
          setActiveSection(current);
        };
        window.addEventListener('scroll', onScroll, { passive:true });
        onScroll();
        return () => window.removeEventListener('scroll', onScroll);
      }, [route]);

      return (
        <LangContext.Provider value={lang}>
          <Header current={activeSection} onNav={navTo} onBook={()=>openBooking()} onHome={goHome} lang={lang} setLang={setLang}/>
          {route.name==='home' && (
            <>
              <Hero onBook={()=>openBooking()} onScrollGames={goGames}/>
              <GamesGrid onOpenGame={openGame}/>
              <HowItWorks/>
              <Pricing onBook={(p)=>openBooking({players:p})}/>
              <FAQ/>
              <Contact onBook={()=>openBooking()}/>
            </>
          )}
          {route.name==='detail' && (
            <GameDetail game={route.game} onBack={goGames} onOpenGame={openGame} onBook={()=>openBooking({gameSlug:route.game.slug})} onPlayVideo={(id)=>openVideoPopup(id)}/>
          )}
          <Footer onNav={navTo} onBook={()=>openBooking()}/>
          <BookingModal open={booking.open} onClose={closeBooking} initialGameSlug={booking.gameSlug} initialPlayers={booking.players}/>
        </LangContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
